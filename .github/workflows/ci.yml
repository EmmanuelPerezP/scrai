name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scrai
          POSTGRES_PASSWORD: scrai
          POSTGRES_DB: scrai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scrai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://scrai:scrai@localhost:5432/scrai
      DATABASE_RUN_SEED: 'false'
      AI_PROVIDER: stub
      NEXT_PUBLIC_API_BASE_URL: ''

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; pinning it here
      # too makes pnpm/action-setup@v4 fail with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec + typed client
        run: pnpm generate:api

      - name: Build all packages
        run: pnpm --filter @scrai/api-client build && pnpm --filter "./apps/*" build

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test
